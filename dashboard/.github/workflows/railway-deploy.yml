name: Deploy to Railway

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Railway
        uses: railway/cli@3.0.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: gex-terminal
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}